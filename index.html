  /* ── Voucher Modal ── */
  _rows:[],_editId:null,

  openVoucherModal(id=null){
    this._editId=id;State.voucherDirty=false;
    let v=null,existing=[];
    if(id){v=State.vouchers.find(x=>x.id===id);existing=State.entries.filter(e=>e.voucher_id===id);}
    this._rows=existing.length>0
      ?existing.map(e=>({account_id:e.account_id,debit:e.debit||0,credit:e.credit||0}))
      :[{account_id:null,debit:0,credit:0},{account_id:null,debit:0,credit:0}];

    const vcode=id?`<span style="font-size:12px;color:var(--accent);font-family:var(--font-mono);margin-left:8px">${Fmt.vc(id)}</span>`:'';
    document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="vchr-modal">
      <div class="modal" style="max-width:760px">
        <div class="modal-header">
          <span class="modal-title">${id?'Edit Voucher':'New Voucher'}${vcode}</span>
          <button class="close-btn" onclick="App.closeVoucherModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-row form-row-2">
            <div class="form-group">
              <label class="form-label">Date</label>
              <input type="date" id="v-date" class="form-input" value="${v?v.date:Fmt.today()}" oninput="State.voucherDirty=true">
            </div>
            <div class="form-group">
              <label class="form-label">Narration</label>
              <input type="text" id="v-narration" class="form-input" value="${v?(v.narration||''):''}" placeholder="Description of transaction" oninput="State.voucherDirty=true">
            </div>
          </div>
          <div class="divider"></div>
          <div id="entry-table-wrap"></div>
          <div class="totals-row" id="totals-row"></div>
          <div id="voucher-error" class="form-error mt-8"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="App.closeVoucherModal()">Cancel</button>
          <button class="btn btn-ghost btn-sm" onclick="App.addEntryRow()">+ Row</button>
          <button class="btn btn-primary" onclick="App.saveVoucher()">Save Voucher</button>
        </div>
      </div>
    </div>`);
    this.renderEntryTable();
  },

  renderEntryTable(){
    const w=document.getElementById('entry-table-wrap');if(!w)return;
    w.innerHTML=`<table class="voucher-table">
      <thead><tr><th style="width:44%">Account</th><th>Debit</th><th>Credit</th><th style="width:28px"></th></tr></thead>
      <tbody id="entry-tbody">${this._rows.map((r,i)=>this.renderRow(r,i)).join('')}</tbody>
    </table>`;
    this.updateTotals();
  },

  renderRow(row,i){
    const name=row.account_id?(Cache.get(row.account_id)?.name||''):'';
    const bal=row._bal;
    return`<tr data-idx="${i}" ${bal?'class="balancing-row"':''}>
      <td><div class="ac-wrap" id="ac-wrap-${i}">
        <input type="text" class="entry-input" id="ac-${i}" value="${name}" placeholder="Account…"
          oninput="App.onAcInput(${i},this.value)" onkeydown="App.onAcKey(event,${i})"
          onfocus="App.onAcInput(${i},this.value)" onblur="setTimeout(()=>App.hideAC(${i}),180)" autocomplete="off">
        <div class="ac-dropdown" id="ac-drop-${i}" style="display:none"></div>
      </div></td>
      <td><input type="number" class="entry-input mono ${bal?'locked':''}" id="dr-${i}" value="${row.debit||''}"
        placeholder="0.00" min="0" step="0.01" inputmode="decimal" ${bal&&row.debit?'readonly':''}
        oninput="App.onAmtChange(${i},'debit',this.value)" onkeydown="App.onAmtKey(event,${i},'debit')"></td>
      <td><input type="number" class="entry-input mono ${bal?'locked':''}" id="cr-${i}" value="${row.credit||''}"
        placeholder="0.00" min="0" step="0.01" inputmode="decimal" ${bal&&row.credit?'readonly':''}
        oninput="App.onAmtChange(${i},'credit',this.value)" onkeydown="App.onAmtKey(event,${i},'credit')"></td>
      <td>${!bal?`<button class="row-del-btn" onclick="App.delRow(${i})">✕</button>`:'<span style="font-size:10px;color:var(--yellow)" title="Auto-balance">⚖</span>'}</td>
    </tr>`;
  },

  onAcInput(i,val){
    const m=Cache.search(val),drop=document.getElementById(`ac-drop-${i}`);if(!drop)return;
    const q=val.toLowerCase();
    drop.innerHTML=m.map(a=>`
      <div class="ac-item" onmousedown="App.selectAc(${i},${a.id},'${a.name.replace(/'/g,"\\'")}')">
        <span>${this.hlAC(a.name,q)}</span>
        <span class="ac-meta"><span class="ac-code">${Fmt.ac(a.id)}</span><span class="ac-type">${a.type}</span></span>
      </div>`).join('')+
      (val&&!State.accounts.find(a=>a.name.toLowerCase()===q)?`<div class="ac-item ac-create" onmousedown="App.quickCreate('${val.replace(/'/g,"\\'")}',${i})">+ Create "${val}"</div>`:'');
    drop.style.display=(m.length>0||val)?'block':'none';this._acF=[i,-1];
  },
  hlAC(n,q){if(!q)return n;const i=n.toLowerCase().indexOf(q);if(i===-1)return n;return n.slice(0,i)+`<span class="ac-match">${n.slice(i,i+q.length)}</span>`+n.slice(i+q.length);},
  _acF:[-1,-1],
  onAcKey(e,i){
    const drop=document.getElementById(`ac-drop-${i}`);const items=drop?drop.querySelectorAll('.ac-item'):[];
    let[,mi]=this._acF;
    if(e.key==='ArrowDown'){e.preventDefault();mi=Math.min(mi+1,items.length-1);this._acF=[i,mi];items.forEach((el,idx)=>el.classList.toggle('selected',idx===mi));}
    else if(e.key==='ArrowUp'){e.preventDefault();mi=Math.max(mi-1,0);this._acF=[i,mi];items.forEach((el,idx)=>el.classList.toggle('selected',idx===mi));}
    else if(e.key==='Enter'&&mi>=0&&items[mi]){e.preventDefault();items[mi].dispatchEvent(new MouseEvent('mousedown'));}
    else if(e.key==='Tab'){if(mi>=0&&items[mi]){e.preventDefault();items[mi].dispatchEvent(new MouseEvent('mousedown'));}this.hideAC(i);}
    else if(e.key==='Escape')this.hideAC(i);
  },
  hideAC(i){const d=document.getElementById(`ac-drop-${i}`);if(d)d.style.display='none';},
  selectAc(i,aid,name){
    this._rows[i].account_id=aid;State.voucherDirty=true;
    const inp=document.getElementById(`ac-${i}`);if(inp)inp.value=name;
    this.hideAC(i);const dr=document.getElementById(`dr-${i}`);if(dr)dr.focus();
  },
  async quickCreate(name,i){
    const type=prompt(`Create "${name}"\nType: Asset, Liability, Income, Expense`,'Asset');
    if(!type||!['Asset','Liability','Income','Expense'].includes(type))return;
    const id=await DB.put('accounts',{name,type,description:'',opening_balance:0});
    await this.loadAll();this.selectAc(i,id,name);Toast.show(`"${name}" created.`,'success');
  },
  onAmtChange(i,field,val){
    State.voucherDirty=true;
    const v=parseFloat(val)||0;this._rows[i][field]=v;
    if(v>0){const o=field==='debit'?'credit':'debit';this._rows[i][o]=0;const el=document.getElementById(`${o==='debit'?'dr':'cr'}-${i}`);if(el)el.value='';}
    this.updateTotals();
  },
  onAmtKey(e,i,field){
    if((e.key==='Tab'||e.key==='Enter')&&field==='credit'&&i===this._rows.length-1&&!e.shiftKey){
      e.preventDefault();this.addEntryRow();setTimeout(()=>document.getElementById(`ac-${i+1}`)?.focus(),50);
    }
  },
  addEntryRow(){
    this._rows.push({account_id:null,debit:0,credit:0});this.renderEntryTable();
    setTimeout(()=>document.getElementById(`ac-${this._rows.length-1}`)?.focus(),30);
  },
  delRow(i){
    if(this._rows.filter(r=>!r._bal).length<=2){Toast.show('Minimum 2 rows required.','error');return;}
    this._rows.splice(i,1);this.renderEntryTable();
  },

  updateTotals(){
    const real=this._rows.filter(r=>!r._bal);
    const dr=real.reduce((s,r)=>s+(r.debit||0),0),cr=real.reduce((s,r)=>s+(r.credit||0),0);
    this._rows=this._rows.filter(r=>!r._bal);
    if(Math.abs(dr-cr)>=0.001&&dr>0.001&&cr>0.001){
      const balDiff=dr>cr?parseFloat((dr-cr).toFixed(2)):parseFloat((cr-dr).toFixed(2));
      const suggested=State.accounts.find(a=>(a.type==='Asset'||a.type==='Liability')&&a.id!==real[0]?.account_id);
      const sugId=suggested?.id||null;
      if(dr>cr)this._rows.push({account_id:sugId,credit:balDiff,debit:0,_bal:true});
      else this._rows.push({account_id:sugId,debit:balDiff,credit:0,_bal:true});
    }
    const tbody=document.getElementById('entry-tbody');
    if(tbody)tbody.innerHTML=this._rows.map((r,i)=>this.renderRow(r,i)).join('');
    const te=document.getElementById('totals-row');
    if(te){
      const allDr=this._rows.reduce((s,r)=>s+(r.debit||0),0);
      const allCr=this._rows.reduce((s,r)=>s+(r.credit||0),0);
      te.innerHTML=`
        <div class="total-cell"><div class="total-label">Total Debit</div><div class="total-amount text-green">${Fmt.num(allDr)}</div></div>
        <div class="total-cell"><div class="total-label">Total Credit</div><div class="total-amount text-red">${Fmt.num(allCr)}</div></div>`;
    }
  },

  async saveVoucher(){
    const date=document.getElementById('v-date').value;
    const narration=document.getElementById('v-narration').value.trim();
    const errEl=document.getElementById('voucher-error');
    if(!date){errEl.textContent='Date is required.';return;}
    const err=Acct.validate(this._rows);if(err){errEl.textContent=err;return;}
    const allRows=this._rows;
    const dr=allRows.reduce((s,r)=>s+(r.debit||0),0),cr=allRows.reduce((s,r)=>s+(r.credit||0),0);
    if(Math.abs(dr-cr)>0.001){errEl.textContent='Voucher not balanced. Select an account for the ⚖ row.';return;}
    const balRow=allRows.find(r=>r._bal);
    if(balRow&&!balRow.account_id){errEl.textContent='Please select an account for the auto-balancing row (⚖).';return;}
    const obj=this._editId?{id:this._editId,date,narration}:{date,narration};
    const vid=await DB.put('vouchers',obj);const finalId=this._editId||vid;
    const old=await DB.byIdx('entries','voucher_id',finalId);for(const e of old)await DB.del('entries',e.id);
    for(const r of allRows){if(!r.account_id)continue;await DB.put('entries',{voucher_id:finalId,account_id:r.account_id,debit:r.debit||0,credit:r.credit||0});}
    await this.loadAll();document.getElementById('vchr-modal').remove();
    Toast.show('Voucher saved.','success');this.navigate(State.currentPage);this.updateFooter();
  },

  async deleteVoucher(id){
    if(!confirm('Delete this voucher and all its entries?'))return;
    const e=await DB.byIdx('entries','voucher_id',id);for(const x of e)await DB.del('entries',x.id);
    await DB.del('vouchers',id);await this.loadAll();Toast.show('Voucher deleted.','info');this.navigate('vouchers');this.updateFooter();
  },
  async duplicateVoucher(id){
    const v=State.vouchers.find(x=>x.id===id);const e=State.entries.filter(x=>x.voucher_id===id);
    const nid=await DB.put('vouchers',{date:Fmt.today(),narration:(v.narration||'')+'(copy)'});
    for(const x of e)await DB.put('entries',{voucher_id:nid,account_id:x.account_id,debit:x.debit,credit:x.credit});
    await this.loadAll();Toast.show('Voucher duplicated.','success');this.navigate('vouchers');this.updateFooter();
  },

  /* ============================================================
     Reports
  ============================================================ */
  _rptFilter:{from:'',to:''},
  _rptGenerated:false,

  renderReports(){
    const tab=window._reportTab||'trial';
    if(!this._rptFilter.from){this._rptFilter.from=Fmt.monthStart();this._rptFilter.to=Fmt.today();}
    const f=this._rptFilter;
    const isLedger=tab==='ledger';
    const selAccId=window._ledgerAccId||(State.accounts[0]?.id||null);
    return`
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">Reports</div>
        <div class="page-subtitle">Set range · click Generate</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${tab==='trial'?'active':''}" onclick="window._reportTab='trial';App._rptGenerated=false;App.navigate('reports')">Trial Balance</div>
      <div class="tab ${tab==='ledger'?'active':''}" onclick="window._reportTab='ledger';App._rptGenerated=false;App.navigate('reports')">Ledger</div>
      <div class="tab ${tab==='income'?'active':''}" onclick="window._reportTab='income';App._rptGenerated=false;App.navigate('reports')">Income Statement</div>
      <div class="tab ${tab==='balance'?'active':''}" onclick="window._reportTab='balance';App._rptGenerated=false;App.navigate('reports')">Balance Sheet</div>
    </div>
    <div class="report-controls">
      <div class="form-group"><label class="form-label">From</label><input type="date" id="rpt-from" class="form-input" value="${f.from}"></div>
      <div class="form-group"><label class="form-label">To</label><input type="date" id="rpt-to" class="form-input" value="${f.to}"></div>
      ${isLedger&&State.accounts.length>0?`
      <div class="form-group" style="flex:1;min-width:180px">
        <label class="form-label">Account</label>
        <select id="rpt-acc" class="form-select" onchange="State.savedLedgerAccId=this.value">
          ${State.accounts.map(a=>`<option value="${a.id}" ${a.id===(State.savedLedgerAccId||selAccId)?'selected':''}>${Fmt.ac(a.id)} — ${a.name}</option>`).join('')}
        </select>
      </div>`:''}
      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="App.generateReport()">Generate</button>
        <button class="btn btn-ghost" onclick="App.resetReport()">Reset</button>
      </div>
    </div>
    <div id="rpt-out">${this._rptGenerated?this._renderRptBody(tab):`
      <div class="card card-pad" style="text-align:center;padding:40px 16px">
        <div style="font-size:26px;margin-bottom:10px;color:var(--text3)">≡</div>
        <div style="color:var(--text3);font-size:13px">Select a date range and tap <strong style="color:var(--text)">Generate</strong></div>
      </div>`}
    </div>`;
  },

  generateReport(){
    const from=document.getElementById('rpt-from')?.value||'';
    const to=document.getElementById('rpt-to')?.value||'';
    if(from&&to&&from>to){Toast.show('From date cannot be after To date.','error');return;}
    this._rptFilter={from,to};
    if(window._reportTab==='ledger'){const s=document.getElementById('rpt-acc');if(s){State.savedLedgerAccId=parseInt(s.value);window._ledgerAccId=parseInt(s.value);}}
    this._rptGenerated=true;
    const out=document.getElementById('rpt-out');
    if(out)out.innerHTML=this._renderRptBody(window._reportTab||'trial');
    Toast.show('Report generated.','success');
  },
  resetReport(){this._rptFilter={from:Fmt.monthStart(),to:Fmt.today()};this._rptGenerated=false;this.navigate('reports');},
  _renderRptBody(tab){return tab==='trial'?this.rptTrial():tab==='ledger'?this.rptLedger():tab==='income'?this.rptIncome():this.rptBalance();},
  rptVouchers(){const{from,to}=this._rptFilter;return State.vouchers.filter(v=>{if(from&&v.date<from)return false;if(to&&v.date>to)return false;return true;});},
  rptEntries(){const ids=new Set(this.rptVouchers().map(v=>v.id));return State.entries.filter(e=>ids.has(e.voucher_id));},
  periodLabel(){const{from,to}=this._rptFilter;return`<strong style="color:var(--text)">${from?Fmt.date(from):'All'}</strong> — <strong style="color:var(--text)">${to?Fmt.date(to):'All'}</strong>`;},

  rptTrial(){
    const entries=this.rptEntries();let tdr=0,tcr=0;
    const rows=State.accounts.map(a=>{
      const trans={dr:entries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.debit||0),0),cr:entries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.credit||0),0)};
      const ob=a.opening_balance||0;
      const isNormal=['Asset','Expense'].includes(a.type);
      const bal=isNormal?(trans.dr-trans.cr+ob):(trans.cr-trans.dr+ob);
      const finalDr=isNormal?Math.max(bal,0):trans.dr;
      const finalCr=isNormal?trans.cr:(bal>=0?bal:0)+(trans.cr);
      tdr+=finalDr;tcr+=finalCr;return{a,dr:finalDr,cr:finalCr,ob};
    }).filter(r=>r.dr>0||r.cr>0||r.ob>0);
    const balanced=Math.abs(tdr-tcr)<0.001;
    return`
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Period: ${this.periodLabel()}</div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>AC #</th><th>Account</th><th>Type</th><th class="text-right">Debit</th><th class="text-right">Credit</th></tr></thead>
      <tbody>
        ${rows.length===0?`<tr><td colspan="5"><div class="empty"><div class="empty-text">No accounts or transactions in this period.</div></div></td></tr>`:
          rows.map(r=>`<tr>
            <td class="mono" style="color:var(--accent)">${Fmt.ac(r.a.id)}</td>
            <td>${r.a.name}</td>
            <td><span class="badge badge-${r.a.type.toLowerCase()}">${r.a.type}</span></td>
            <td class="mono text-right text-green">${r.dr>0?Fmt.num(r.dr):'—'}</td>
            <td class="mono text-right text-red">${r.cr>0?Fmt.num(r.cr):'—'}</td>
          </tr>`).join('')}
        <tr style="border-top:2px solid var(--border2)">
          <td colspan="3"><strong>TOTAL</strong></td>
          <td class="mono text-right text-green fw-600">${Fmt.num(tdr)}</td>
          <td class="mono text-right text-red fw-600">${Fmt.num(tcr)}</td>
        </tr>
        <tr><td colspan="5" class="text-center ${balanced?'text-green':'text-red'} mono fw-600" style="padding:12px">
          ${balanced?'Trial Balance BALANCED':'IMBALANCE: '+Fmt.num(Math.abs(tdr-tcr))}
        </td></tr>
      </tbody>
    </table></div></div>`;
  },

  rptLedger(){
    const selId=State.savedLedgerAccId||window._ledgerAccId||(State.accounts[0]?.id||null);
    const acc=selId?Cache.get(selId):null;
    if(!acc)return'<div class="empty"><div class="empty-text">No accounts available.</div></div>';
    const entries=this.rptEntries().filter(e=>e.account_id===selId);
    const vMap=new Map(State.vouchers.map(v=>[v.id,v]));
    const isNormal=['Asset','Expense'].includes(acc.type);
    let running=acc.opening_balance||0;
    const rows=entries.map(e=>({e,v:vMap.get(e.voucher_id)})).filter(x=>x.v)
      .sort((a,b)=>a.v.date.localeCompare(b.v.date))
      .map(({e,v})=>{const dr=e.debit||0,cr=e.credit||0;running+=isNormal?(dr-cr):(cr-dr);return{e,dr,cr,running,v};});
    return`
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">
      <strong style="color:var(--text)">${Fmt.ac(acc.id)} — ${acc.name}</strong>
      &nbsp;<span class="badge badge-${acc.type.toLowerCase()}">${acc.type}</span>
      &nbsp;Period: ${this.periodLabel()}
      ${(acc.opening_balance||0)!==0?`&nbsp;· Opening: <strong style="color:var(--accent)">${Fmt.num(acc.opening_balance)}</strong>`:''}
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>V#</th><th>Date</th><th>Narration</th><th class="text-right">Dr</th><th class="text-right">Cr</th><th class="text-right">Balance</th></tr></thead>
      <tbody>
        ${(acc.opening_balance||0)!==0?`<tr style="background:var(--surface2)">
          <td class="mono text-muted">—</td><td class="mono text-muted">Opn</td><td class="text-muted">Opening Balance</td>
          <td class="mono text-right">—</td><td class="mono text-right">—</td>
          <td class="mono text-right fw-600" style="color:var(--accent)">${Fmt.num(acc.opening_balance)}</td>
        </tr>`:''}
        ${rows.length===0?`<tr><td colspan="6"><div class="empty"><div class="empty-text">No transactions for this account in this period.</div></div></td></tr>`:
          rows.map(r=>`<tr>
            <td class="mono" style="color:var(--accent)">${Fmt.vc(r.v.id)}</td>
            <td class="mono" style="white-space:nowrap">${Fmt.date(r.v.date)}</td>
            <td>${r.v.narration||'—'}</td>
            <td class="mono text-right text-green">${r.dr>0?Fmt.num(r.dr):'—'}</td>
            <td class="mono text-right text-red">${r.cr>0?Fmt.num(r.cr):'—'}</td>
            <td class="mono text-right fw-600 ${r.running>=0?'text-green':'text-red'}">${Fmt.num(Math.abs(r.running))} ${r.running>=0?'Dr':'Cr'}</td>
          </tr>`).join('')}
      </tbody>
    </table></div></div>`;
  },

  rptIncome(){
    const entries=this.rptEntries();
    const iAccs=State.accounts.filter(a=>a.type==='Income');
    const eAccs=State.accounts.filter(a=>a.type==='Expense');
    const cal=a=>{
      const dr=entries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.debit||0),0);
      const cr=entries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.credit||0),0);
      return a.type==='Income'?cr-dr:dr-cr;
    };
    const ti=iAccs.reduce((s,a)=>s+cal(a),0),te=eAccs.reduce((s,a)=>s+cal(a),0),net=ti-te;
    return`
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Period: ${this.periodLabel()}</div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>AC #</th><th>Account</th><th class="text-right">Amount</th></tr></thead>
      <tbody>
        <tr><td colspan="3" style="background:var(--surface2);padding:8px 14px"><strong style="color:var(--green)">INCOME</strong></td></tr>
        ${iAccs.length===0?'<tr><td colspan="3" class="text-muted text-center" style="padding:8px">No income accounts</td></tr>':
          iAccs.map(a=>`<tr><td class="mono" style="color:var(--accent);padding-left:20px">${Fmt.ac(a.id)}</td><td style="padding-left:20px">${a.name}</td><td class="mono text-right text-green">${Fmt.num(cal(a))}</td></tr>`).join('')}
        <tr style="border-top:1px solid var(--border2)"><td></td><td><strong>Total Income</strong></td><td class="mono text-right text-green fw-600">${Fmt.num(ti)}</td></tr>
        <tr><td colspan="3" style="background:var(--surface2);padding:8px 14px"><strong style="color:var(--yellow)">EXPENSES</strong></td></tr>
        ${eAccs.length===0?'<tr><td colspan="3" class="text-muted text-center" style="padding:8px">No expense accounts</td></tr>':
          eAccs.map(a=>`<tr><td class="mono" style="color:var(--accent);padding-left:20px">${Fmt.ac(a.id)}</td><td style="padding-left:20px">${a.name}</td><td class="mono text-right text-yellow">${Fmt.num(cal(a))}</td></tr>`).join('')}
        <tr style="border-top:1px solid var(--border2)"><td></td><td><strong>Total Expenses</strong></td><td class="mono text-right fw-600 text-yellow">${Fmt.num(te)}</td></tr>
        <tr style="border-top:2px solid var(--border2)"><td></td><td><strong>Net ${net>=0?'Profit':'Loss'}</strong></td><td class="mono text-right fw-600 ${net>=0?'text-green':'text-red'}">${Fmt.money(Math.abs(net))}</td></tr>
      </tbody>
    </table></div></div>`;
  },

  rptBalance(){
    const periodEntries=this.rptEntries();
    const assets=State.accounts.filter(a=>a.type==='Asset').map(a=>{
      const dr=periodEntries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.debit||0),0);
      const cr=periodEntries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.credit||0),0);
      const ob=a.opening_balance||0;
      const bal=dr-cr+ob;
      return{a,bal};
    }).filter(r=>r.bal!==0);
    const liabilities=State.accounts.filter(a=>a.type==='Liability').map(a=>{
      const dr=periodEntries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.debit||0),0);
      const cr=periodEntries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.credit||0),0);
      const ob=a.opening_balance||0;
      const bal=cr-dr+ob;
      return{a,bal};
    }).filter(r=>r.bal!==0);
    const iAccs=State.accounts.filter(a=>a.type==='Income');
    const eAccs=State.accounts.filter(a=>a.type==='Expense');
    const iBalance=iAccs.reduce((s,a)=>{
      const cr=periodEntries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.credit||0),0);
      const dr=periodEntries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.debit||0),0);
      return s+(cr-dr);
    },0);
    const eBalance=eAccs.reduce((s,a)=>{
      const dr=periodEntries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.debit||0),0);
      const cr=periodEntries.filter(e=>e.account_id===a.id).reduce((s,e)=>s+(e.credit||0),0);
      return s+(dr-cr);
    },0);
    const totalAssets=assets.reduce((s,r)=>s+r.bal,0);
    const totalLiab=liabilities.reduce((s,r)=>s+r.bal,0);
    const totalEq=iBalance-eBalance;
    return`
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">As at ${this._rptFilter.to?Fmt.date(this._rptFilter.to):Fmt.today()}</div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>ASSETS</th><th class="text-right">Amount</th></tr></thead>
      <tbody>
        ${assets.length===0?'<tr><td colspan="2" class="text-muted text-center" style="padding:8px">No asset accounts</td></tr>':assets.map(r=>`<tr><td style="padding-left:16px">${Fmt.ac(r.a.id)} — ${r.a.name}</td><td class="mono text-right text-green">${Fmt.money(r.bal)}</td></tr>`).join('')}
        <tr style="border-top:1px solid var(--border2)"><td style="padding-left:16px"><strong>Total Assets</strong></td><td class="mono text-right text-green fw-600">${Fmt.money(totalAssets)}</td></tr>
      </tbody>
    </table></div></div>
    <div class="card" style="margin-top:16px"><div class="table-wrap"><table>
      <thead><tr><th>LIABILITIES & EQUITY</th><th class="text-right">Amount</th></tr></thead>
      <tbody>
        <tr><td colspan="2" style="background:var(--surface2);padding:8px 14px"><strong style="color:var(--red)">LIABILITIES</strong></td></tr>
        ${liabilities.length===0?'<tr><td colspan="2" class="text-muted text-center" style="padding:8px">No liability accounts</td></tr>':liabilities.map(r=>`<tr><td style="padding-left:20px">${Fmt.ac(r.a.id)} — ${r.a.name}</td><td class="mono text-right text-red">${Fmt.money(r.bal)}</td></tr>`).join('')}
        <tr style="border-top:1px solid var(--border2)"><td style="padding-left:20px"><strong>Total Liabilities</strong></td><td class="mono text-right text-red fw-600">${Fmt.money(totalLiab)}</td></tr>
        <tr><td colspan="2" style="background:var(--surface2);padding:8px 14px"><strong style="color:var(--green)">EQUITY</strong></td></tr>
        <tr><td style="padding-left:20px">Net Profit/Loss</td><td class="mono text-right ${totalEq>=0?'text-green':'text-red'} fw-600">${Fmt.money(totalEq)}</td></tr>
        <tr style="border-top:2px solid var(--border2)"><td><strong>Total Liabilities & Equity</strong></td><td class="mono text-right fw-600 ${Math.abs(totalAssets-(totalLiab+totalEq))<0.01?'text-green':'text-red'}">${Fmt.money(totalLiab+totalEq)}</td></tr>
      </tbody>
    </table></div></div>
    ${Math.abs(totalAssets-(totalLiab+totalEq))<0.01?'':'<div style="color:var(--red);padding:12px;margin-top:12px"><strong>⚠ Balance Sheet does not balance</strong></div>'}`;
  },

  /* ============================================================
     Settings — no password security section
  ============================================================ */
  renderSettings(){
    return`
    <div class="page-header"><div class="page-header-left"><div class="page-title">Settings</div></div></div>
    <div class="settings-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:760px">

      <div class="card card-pad">
        <div style="font-weight:600;margin-bottom:14px">Appearance</div>
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">Theme</label>
          <select id="s-theme" class="form-select" onchange="App.applyTheme(this.value)">
            <option value="dark" ${(State.settings.theme||'dark')==='dark'?'selected':''}>Dark</option>
            <option value="light" ${State.settings.theme==='light'?'selected':''}>Light</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Currency Symbol</label>
          <input id="s-currency" class="form-input" value="${State.settings.currency||'PKR'}" placeholder="PKR">
          <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="App.saveCurrency()">Save Currency</button>
        </div>
      </div>

      <div class="card card-pad">
        <div style="font-weight:600;margin-bottom:14px">Data Export / Import</div>
        <p style="font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.5">Export all your data as a JSON backup file, or restore from a previous backup.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="App.exportData()">⬇ Export JSON</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-file').click()">⬆ Import JSON</button>
          <input type="file" id="import-file" accept=".json" style="display:none" onchange="App.importData(this)">
        </div>
      </div>

      <div class="card card-pad">
        <div style="font-weight:600;margin-bottom:14px">Reset Data</div>
        <p style="font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.5">Permanently delete all vouchers and entries. Accounts will be preserved.</p>
        <button class="btn btn-danger btn-sm" onclick="App.resetData()">Reset All Data</button>
      </div>

      <div class="card card-pad" style="background:var(--surface2)">
        <div style="font-weight:600;margin-bottom:10px">About</div>
        <div style="font-size:12px;color:var(--text3);line-height:1.7">
          <div>Version: <span style="color:var(--text);font-family:var(--font-mono)">1.0</span></div>
          <div>Storage: <span style="color:var(--text)">IndexedDB (offline)</span></div>
          <div>Accounts: <span style="color:var(--accent);font-family:var(--font-mono)">${State.accounts.length}</span></div>
          <div>Vouchers: <span style="color:var(--accent);font-family:var(--font-mono)">${State.vouchers.length}</span></div>
          <div>Entries: <span style="color:var(--accent);font-family:var(--font-mono)">${State.entries.length}</span></div>
        </div>
      </div>

      <div class="card card-pad">
        <div style="font-weight:600;margin-bottom:10px">Account</div>
        <button class="btn btn-danger btn-sm" onclick="Auth.logout()">🚪 Sign Out</button>
      </div>

    </div>`;
  },

  async applyTheme(t){document.documentElement.setAttribute('data-theme',t);await this.saveSetting('theme',t);Toast.show('Theme updated.','info');},
  async saveCurrency(){
    const c=document.getElementById('s-currency').value.trim()||'PKR';
    if(Fmt.currency===c){Toast.show('No changes.','info');return;}
    if(!confirm(`Change currency to ${c}?\n(This will be used for all future displays)`))return;
    await this.saveSetting('currency',c);Fmt.currency=c;Toast.show('Currency updated.','success');
  },
  exportData(){
    const d={version:1,exported:new Date().toISOString(),accounts:State.accounts,vouchers:State.vouchers,entries:State.entries};
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));a.download=`ledger-backup-${Fmt.today()}.json`;a.click();
    Toast.show('Data exported.','success');
  },
  async importData(input){
    const file=input.files[0];if(!file)return;let d;
    try{d=JSON.parse(await file.text());}catch{Toast.show('Invalid JSON file.','error');input.value='';return;}
    if(!d.accounts||!d.vouchers||!d.entries){Toast.show('Invalid backup format.','error');input.value='';return;}
    if(!confirm(`Overwrite ALL current data?\n${d.accounts.length} accounts · ${d.vouchers.length} vouchers · ${d.entries.length} entries`))return;
    const backup={version:1,backed_up:new Date().toISOString(),accounts:State.accounts,vouchers:State.vouchers,entries:State.entries};
    await DB.put('settings',{key:'_last_backup',value:JSON.stringify(backup)});
    await DB.clr('accounts');await DB.clr('vouchers');await DB.clr('entries');
    for(const a of d.accounts)await DB.put('accounts',a);
    for(const v of d.vouchers)await DB.put('vouchers',v);
    for(const e of d.entries)await DB.put('entries',e);
    await this.loadAll();Toast.show('Data imported! Backup saved.','success');this.navigate('dashboard');input.value='';
  },
  async resetData(){
    if(!confirm('Permanently delete all vouchers and entries? Accounts kept.'))return;
    if(prompt('Type RESET to confirm:')!=='RESET'){Toast.show('Reset cancelled.','info');return;}
    await DB.clr('vouchers');await DB.clr('entries');await this.loadAll();
    Toast.show('All vouchers deleted.','info');this.navigate('dashboard');this.updateFooter();
  },

  /* ── Seed ── */
  async seedIfEmpty(){
    if(State.accounts.length>0)return;
    const defaults=[
      {name:'Cash',type:'Asset',description:'Physical cash on hand',opening_balance:0},
      {name:'Bank Account',type:'Asset',description:'Primary bank account',opening_balance:0},
      {name:'Accounts Receivable',type:'Asset',description:'Money owed to you',opening_balance:0},
      {name:'Accounts Payable',type:'Liability',description:'Money you owe',opening_balance:0},
      {name:'Loan Payable',type:'Liability',description:'Outstanding loans',opening_balance:0},
      {name:'Sales Revenue',type:'Income',description:'Revenue from sales',opening_balance:0},
      {name:'Service Income',type:'Income',description:'Revenue from services',opening_balance:0},
      {name:'Rent Expense',type:'Expense',description:'Rent payments',opening_balance:0},
      {name:'Salary Expense',type:'Expense',description:'Employee salaries',opening_balance:0},
      {name:'Utilities',type:'Expense',description:'Utility bills',opening_balance:0},
    ];
    for(const a of defaults)await DB.put('accounts',a);
    await this.loadAll();Toast.show('Welcome! Default accounts created.','info',4000);
  }
};

document.addEventListener('DOMContentLoaded',async()=>{
  // Initialize Supabase
  await SupabaseClient.init();
  
  // Check if user is authenticated before initializing app
  if(Auth.isAuthenticated()){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    await App.init();await App.seedIfEmpty();App.navigate('dashboard');
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});
</script>
<script src="supabase-client.js"></script>
</body>
</html>
